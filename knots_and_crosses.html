 <div style="text-align: center; padding: 20px;">
  <h3 style="font-size: 1.5em; margin-bottom: 20px;">Knots and Crosses</h3>
  <div id="gameBoard" style="display: grid; grid-template-columns: repeat(3, 100px); grid-gap: 5px; margin: 20px auto; width: 315px;">
   <div class="cell" data-index="0" style="width: 100px; height: 100px; border: 1px solid #ccc; font-size: 2em; text-align: center; cursor: pointer;"></div>
   <div class="cell" data-index="1" style="width: 100px; height: 100px; border: 1px solid #ccc; font-size: 2em; text-align: center; cursor: pointer;"></div>
   <div class="cell" data-index="2" style="width: 100px; height: 100px; border: 1px solid #ccc; font-size: 2em; text-align: center; cursor: pointer;"></div>
   <div class="cell" data-index="3" style="width: 100px; height: 100px; border: 1px solid #ccc; font-size: 2em; text-align: center; cursor: pointer;"></div>
   <div class="cell" data-index="4" style="width: 100px; height: 100px; border: 1px solid #ccc; font-size: 2em; text-align: center; cursor: pointer;"></div>
   <div class="cell" data-index="5" style="width: 100px; height: 100px; border: 1px solid #ccc; font-size: 2em; text-align: center; cursor: pointer;"></div>
   <div class="cell" data-index="6" style="width: 100px; height: 100px; border: 1px solid #ccc; font-size: 2em; text-align: center; cursor: pointer;"></div>
   <div class="cell" data-index="7" style="width: 100px; height: 100px; border: 1px solid #ccc; font-size: 2em; text-align: center; cursor: pointer;"></div>
   <div class="cell" data-index="8" style="width: 100px; height: 100px; border: 1px solid #ccc; font-size: 2em; text-align: center; cursor: pointer;"></div>
  </div>
  <p id="message" style="font-size: 1.2em; margin-top: 10px;"></p>
 </div>
 <script>
  // JavaScript game logic here
  const board = document.getElementById('gameBoard');
  const cells = document.querySelectorAll('.cell');
  const message = document.getElementById('message');
  let currentPlayer = 'X';
  let gameBoard = ['', '', '', '', '', '', '', '', ''];
  let gameActive = true;

  function handleCellClick(index) {
   if (gameBoard[index] === '' && gameActive) {
    gameBoard[index] = currentPlayer;
    cells[index].textContent = currentPlayer;
    checkWin();
    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    if (currentPlayer === 'O' && gameActive) {
     makeAIMove();
    }
   }
  }

  function makeAIMove() {
   let bestMove;
   let bestScore = -Infinity;
   for (let i = 0; i < gameBoard.length; i++) {
    if (gameBoard[i] === '') {
     gameBoard[i] = 'O';
     let score = minimax(gameBoard, false);
     gameBoard[i] = '';
     if (score > bestScore) {
      bestScore = score;
      bestMove = i;
     }
    }
   }
   gameBoard[bestMove] = 'O';
   cells[bestMove].textContent = 'O';
   checkWin();
   currentPlayer = 'X';
  }

  function minimax(board, isMaximizing) {
   let scores = {
    X: -1,
    O: 1,
    tie: 0
   };
   let winner = checkWinner();
   if (winner !== null) {
    return scores[winner];
   }
   if (isMaximizing) {
    let bestScore = -Infinity;
    for (let i = 0; i < board.length; i++) {
     if (board[i] === '') {
      board[i] = 'O';
      let score = minimax(board, false);
      board[i] = '';
      bestScore = Math.max(score, bestScore);     }
    }
    return bestScore;
   } else {
    let bestScore = Infinity;
    for (let i = 0; i < board.length; i++) {
     if (board[i] === '') {
      board[i] = 'X';
      let score = minimax(board, true);
      board[i] = '';
      bestScore = Math.min(score, bestScore);
     }
    }
    return bestScore;
   }
  }

  function checkWin() {
   const winPatterns = [
    [0, 1, 2],
    [3, 4, 5],
    [6, 7, 8],
    [0, 3, 6],
    [1, 4, 7],
    [2, 5, 8],
    [0, 4, 8],
    [2, 4, 6]
   ];
   for (let pattern of winPatterns) {
    const [a, b, c] = pattern;
    if (gameBoard[a] && gameBoard[a] === gameBoard[b] && gameBoard[a] === gameBoard[c]) {
     message.textContent = `${gameBoard[a]} wins!`;
     gameActive = false;
     return;
    }
   }
   if (!gameBoard.includes('')) {
    message.textContent = 'It\'s a tie!';
    gameActive = false;
    return;
   }
  }

  cells.forEach((cell, index) => {
   cell.addEventListener('click', () => handleCellClick(index));
  });
 </script>
